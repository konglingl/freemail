name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "PLACEHOLDER_D1_ID" # 部署时由环境变量或 CI 注入真实 database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
ADMIN_NAME = "admin"
MAIL_DOMAIN = "959298.xyz,bura25.959298.xyz,esgfse.959298.xyz,tj56.959298.xyz,95d6rg.959298.xyz,dsg3.959298.xyz,q9gb6.959298.xyz,mxg9.959298.xyz,3195.959298.xyz,cxg95.959298.xyz,rgs62.959298.xyz"
ROOT_MAIL_ZONE = "959298.xyz"
AUTO_ROTATION_ENABLED = "false"
AUTO_DOMAIN_PREFIX = "auto"
# CF_ZONE_ID = "your_zone_id"
# CF_API_TOKEN 请使用 wrangler secret put CF_API_TOKEN
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]"


# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

[triggers]
crons = ["0 * * * *"]

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true



